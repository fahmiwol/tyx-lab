<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 440" font-family="ui-sans-serif,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#211a4d"/>
      <stop offset="1" stop-color="#4c1d95"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.28" r="0.5">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="440" fill="url(#bg)"/>
  <rect width="1280" height="440" fill="url(#glow)"/>
  <!-- atom lattice motif -->
  <g stroke="#a78bfa" stroke-opacity="0.28" stroke-width="1.5">
    <line x1="980" y1="120" x2="1090" y2="90"/><line x1="1090" y1="90" x2="1170" y2="170"/>
    <line x1="1170" y1="170" x2="1080" y2="230"/><line x1="1080" y1="230" x2="980" y2="120"/>
    <line x1="1080" y1="230" x2="1140" y2="320"/><line x1="980" y1="120" x2="920" y2="220"/>
    <line x1="920" y1="220" x2="1080" y2="230"/><line x1="1140" y1="320" x2="1030" y2="350"/>
    <line x1="1030" y1="350" x2="920" y2="220"/>
  </g>
  <g fill="#c4b5fd">
    <circle cx="980" cy="120" r="9"/><circle cx="1090" cy="90" r="7"/><circle cx="1170" cy="170" r="8"/>
    <circle cx="1080" cy="230" r="11" fill="#f5d0fe"/><circle cx="920" cy="220" r="7"/>
    <circle cx="1140" cy="320" r="8"/><circle cx="1030" cy="350" r="6"/>
  </g>
  <!-- wordmark -->
  <text x="90" y="185" font-size="104" font-weight="800" fill="url(#wm)" letter-spacing="-3">tyx-lab</text>
  <text x="94" y="242" font-size="27" font-weight="600" fill="#a5b4fc">Atomic building blocks for AI agents, LLM apps &amp; modern software</text>
  <text x="94" y="284" font-size="20" fill="#8b93c9">Copy-paste-ready modules &amp; artifacts, distilled from real production systems.</text>
  <!-- chips -->
  <g font-size="19" font-weight="600">
    <g transform="translate(90,330)">
      <rect width="150" height="42" rx="21" fill="#312e81" fill-opacity="0.7" stroke="#6366f1" stroke-opacity="0.5"/><text x="75" y="28" fill="#e0e7ff" text-anchor="middle">AI Agents</text>
    </g>
    <g transform="translate(252,330)">
      <rect width="96" height="42" rx="21" fill="#312e81" fill-opacity="0.7" stroke="#6366f1" stroke-opacity="0.5"/><text x="48" y="28" fill="#e0e7ff" text-anchor="middle">LLM</text>
    </g>
    <g transform="translate(360,330)">
      <rect width="96" height="42" rx="21" fill="#312e81" fill-opacity="0.7" stroke="#6366f1" stroke-opacity="0.5"/><text x="48" y="28" fill="#e0e7ff" text-anchor="middle">RAG</text>
    </g>
    <g transform="translate(468,330)">
      <rect width="132" height="42" rx="21" fill="#312e81" fill-opacity="0.7" stroke="#6366f1" stroke-opacity="0.5"/><text x="66" y="28" fill="#e0e7ff" text-anchor="middle">Fintech</text>
    </g>
    <g transform="translate(612,330)">
      <rect width="132" height="42" rx="21" fill="#312e81" fill-opacity="0.7" stroke="#6366f1" stroke-opacity="0.5"/><text x="66" y="28" fill="#e0e7ff" text-anchor="middle">Next.js</text>
    </g>
    <g transform="translate(756,330)">
      <rect width="140" height="42" rx="21" fill="#312e81" fill-opacity="0.7" stroke="#6366f1" stroke-opacity="0.5"/><text x="70" y="28" fill="#e0e7ff" text-anchor="middle">Three.js</text>
    </g>
  </g>
  <text x="90" y="410" font-size="17" fill="#7c83b3">Open source — use it wisely.  ·  MIT  ·  github.com/fahmiwol/tyx-lab</text>
</svg>
