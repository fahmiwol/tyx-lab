<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Studio — Map Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0f; --surface: #16181c; --border: #2a2d35;
      --accent: #6c63ff; --accent2: #00d4aa; --text: #e8eaf0; --muted: #6b7280;
      --danger: #ff4757; --success: #2ed573;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 16px 32px; display: flex; align-items: center; gap: 16px;
    }
    header .logo { font-size: 20px; font-weight: 700; }
    header .logo span { color: var(--accent); }
    header .back-btn { margin-left: auto; background: var(--border); border: none; border-radius: 8px; color: var(--text); cursor: pointer; padding: 8px 16px; font-size: 13px; text-decoration: none; display: inline-block; }
    header .back-btn:hover { background: var(--accent); }

    .container { max-width: 1200px; margin: 0 auto; padding: 32px; display: grid; grid-template-columns: 360px 1fr; gap: 24px; }
    @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }

    h1 { font-size: 24px; margin-bottom: 8px; }
    .subtitle { color: var(--muted); margin-bottom: 20px; }

    .form-row { margin-bottom: 14px; }
    label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 6px; }
    input[type="text"], textarea, select {
      width: 100%; padding: 10px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: var(--surface); color: var(--text);
      font-size: 14px; font-family: inherit;
    }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
    textarea { min-height: 100px; resize: vertical; }

    .btn-primary {
      background: var(--accent); color: #fff; border: none; border-radius: 10px;
      padding: 12px 24px; font-size: 14px; font-weight: 700; cursor: pointer;
      transition: all 0.2s; width: 100%; margin-bottom: 10px;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(108,99,255,0.3); }
    .btn-secondary {
      background: var(--surface); color: var(--text); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px; font-size: 13px; cursor: pointer; width: 100%;
    }
    .btn-secondary:hover { border-color: var(--accent); }

    .preview-wrap {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      min-height: 500px; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    #map-canvas { image-rendering: pixelated; }
    .preview-placeholder { color: var(--muted); font-size: 14px; text-align: center; }

    .info-row { display: flex; gap: 8px; margin-top: 8px; }
    .info-chip {
      padding: 4px 10px; border-radius: 6px; background: var(--surface); border: 1px solid var(--border);
      font-size: 11px; color: var(--muted);
    }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 10px 20px; border-radius: 10px; font-size: 13px; z-index: 9999; display: none;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Studio<span>AI</span> — Map Generator</div>
    <a class="back-btn" href="index.html">← Kembali</a>
  </header>

  <div class="container">
    <div class="left">
      <h1>🗺️ Map Generator</h1>
      <p class="subtitle">Deskripsikan dunia → AI generate layout → Preview isometric.</p>

      <div class="form-row">
        <label>Deskripsi Dunia</label>
        <textarea id="desc" placeholder="Contoh: Kantor cyberpunk 3 lantai dengan rooftop garden, server room di basement, dan lounge di lantai 2..."></textarea>
      </div>
      <div class="form-row">
        <label>Ukuran Grid</label>
        <select id="grid-size">
          <option value="16">16×16 (Small)</option>
          <option value="24">24×24 (Medium)</option>
          <option value="32" selected>32×32 (Large)</option>
        </select>
      </div>
      <div class="form-row">
        <label>Style</label>
        <select id="style">
          <option value="cyberpunk">Cyberpunk Office</option>
          <option value="nature">Nature Retreat</option>
          <option value="scifi">Sci-Fi Station</option>
          <option value="fantasy">Fantasy Castle</option>
        </select>
      </div>
      <button class="btn-primary" id="generate">Generate Map</button>
      <button class="btn-secondary" id="export-json">Export JSON</button>
      <button class="btn-secondary" id="send-world">Send to World</button>
      <div class="info-row" id="info"></div>
    </div>

    <div class="right">
      <div class="preview-wrap" id="preview">
        <div class="preview-placeholder">
          <div style="font-size:40px;margin-bottom:8px">🗺️</div>
          Deskripsi dunia → Generate → Preview muncul di sini
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    const descEl = document.getElementById('desc');
    const sizeEl = document.getElementById('grid-size');
    const styleEl = document.getElementById('style');
    const preview = document.getElementById('preview');
    const info = document.getElementById('info');
    const toast = document.getElementById('toast');
    let currentMap = null;

    function showToast(msg) { toast.textContent = msg; toast.style.display = 'block'; setTimeout(() => toast.style.display = 'none', 3000); }

    function tileColor(val) {
      const colors = {
        0: '#0f172a', 1: '#334155', 2: '#475569', 3: '#64748b',
        7: '#0ea5e9', 8: '#10b981', 9: '#f59e0b', 10: '#ef4444'
      };
      return colors[val] || '#334155';
    }

    function generateMockMap(desc, size, style) {
      const tiles = Array.from({ length: size }, () => Array(size).fill(0));
      const rooms = [];
      const objects = [];

      // Fill base floor
      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          tiles[y][x] = 1;
        }
      }

      // Create rooms (simple rect placement)
      const roomCount = 3 + Math.floor(Math.random() * 4);
      for (let i = 0; i < roomCount; i++) {
        const rw = 4 + Math.floor(Math.random() * 6);
        const rh = 4 + Math.floor(Math.random() * 6);
        const rx = Math.floor(Math.random() * (size - rw - 2)) + 1;
        const ry = Math.floor(Math.random() * (size - rh - 2)) + 1;
        const tileType = [2, 3, 7, 8][Math.floor(Math.random() * 4)];
        for (let y = ry; y < ry + rh; y++) {
          for (let x = rx; x < rx + rw; x++) {
            if (y < size && x < size) tiles[y][x] = tileType;
          }
        }
        rooms.push({ id: 'room-' + i, name: 'Room ' + (i + 1), x: rx, y: ry, w: rw, h: rh, tileType });
        // Add objects in room
        const objTypes = ['desk', 'chair', 'sofa', 'plant', 'lamp', 'computer', 'whiteboard'];
        const objCount = 1 + Math.floor(Math.random() * 3);
        for (let j = 0; j < objCount; j++) {
          const ox = rx + 1 + Math.floor(Math.random() * (rw - 2));
          const oy = ry + 1 + Math.floor(Math.random() * (rh - 2));
          objects.push({ type: objTypes[Math.floor(Math.random() * objTypes.length)], tileX: ox, tileY: oy });
        }
      }

      return { size, tiles, rooms, objects, desc, style };
    }

    function renderPreview(map) {
      const S = 16; // pixel per tile
      const W = map.size * S;
      const H = map.size * S;
      const canvas = document.createElement('canvas');
      canvas.id = 'map-canvas';
      canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');

      // Draw tiles
      for (let y = 0; y < map.size; y++) {
        for (let x = 0; x < map.size; x++) {
          ctx.fillStyle = tileColor(map.tiles[y][x]);
          ctx.fillRect(x * S, y * S, S, S);
        }
      }

      // Draw grid
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= map.size; i++) {
        ctx.beginPath(); ctx.moveTo(i * S, 0); ctx.lineTo(i * S, H); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i * S); ctx.lineTo(W, i * S); ctx.stroke();
      }

      // Draw objects (simple icons)
      const icons = { desk: '🖥️', chair: '🪑', sofa: '🛋️', plant: '🪴', lamp: '💡', computer: '💻', whiteboard: '📝' };
      for (const obj of map.objects) {
        ctx.font = '10px serif';
        ctx.textAlign = 'center';
        ctx.fillText(icons[obj.type] || '⬜', obj.tileX * S + S / 2, obj.tileY * S + S / 2 + 4);
      }

      preview.innerHTML = '';
      preview.appendChild(canvas);
      info.innerHTML = `<span class="info-chip">${map.size}×${map.size}</span><span class="info-chip">${map.rooms.length} rooms</span><span class="info-chip">${map.objects.length} objects</span>`;
    }

    document.getElementById('generate').onclick = () => {
      const desc = descEl.value || 'cyberpunk office';
      const size = parseInt(sizeEl.value);
      const style = styleEl.value;
      currentMap = generateMockMap(desc, size, style);
      renderPreview(currentMap);
      showToast('Map generated (mock mode)');
    };

    document.getElementById('export-json').onclick = () => {
      if (!currentMap) { showToast('Generate dulu'); return; }
      const blob = new Blob([JSON.stringify(currentMap, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'map-' + Date.now() + '.json'; a.click();
      URL.revokeObjectURL(url);
    };

    document.getElementById('send-world').onclick = () => {
      if (!currentMap) { showToast('Generate dulu'); return; }
      showToast('Map dikirim ke World Builder (mock)');
    };
  </script>
</body>
</html>
